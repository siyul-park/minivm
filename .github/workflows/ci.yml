name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:

jobs:
  check:
    strategy:
      matrix:
        os: [ ubuntu-24.04 ]
        go: [ '1.26.2' ]
    name: Check ${{ matrix.os }} @ Go ${{ matrix.go }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: Cache Go Modules and Build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ matrix.go }}-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-${{ matrix.go }}-${{ hashFiles('**/go.sum') }}

      - name: Initialize Project
        run: make init

      - name: Run Checks
        run: make check

  coverage:
    needs: check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'

      - name: Initialize Project
        run: make init

      - name: Generate Coverage
        run: make coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.out
          fail_ci_if_error: false

  benchmark:
    needs: check
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        os: [ ubuntu-24.04 ]
        go: [ '1.26.2' ]
    name: Benchmark Comparison ${{ matrix.os }} @ Go ${{ matrix.go }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - name: Checkout Previous Code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.before }}
          path: previous

      - name: Checkout New Code
        uses: actions/checkout@v7
        with:
          path: new

      - name: Set up Go for Benchmarking
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: Install Benchmark Dependencies
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Initialize Previous Code
        working-directory: previous
        run: make init

      - name: Run Benchmark (Previous)
        working-directory: previous
        run: make benchmark test-options="-count=10" | tee benchmark.txt

      - name: Initialize New Code
        working-directory: new
        run: make init

      - name: Run Benchmark (New)
        working-directory: new
        run: make benchmark test-options="-count=10" | tee benchmark.txt

      - name: Compare Benchmark Results
        run: benchstat previous/benchmark.txt new/benchmark.txt
